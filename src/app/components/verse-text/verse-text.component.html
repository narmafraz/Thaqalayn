<div class="textrow">
  <div lang="ar">
    <p class="verseText arabic" *ngIf="verse.narrator_chain">
      <ng-container *ngFor="let npart of verse.narrator_chain.parts" [ngSwitch]="npart.kind">
        <a *ngSwitchCase="'narrator'" [routerLink]="npart.path" queryParamsHandling="preserve">{{npart.text}}</a>
        <ng-container *ngSwitchDefault>
          {{npart.text}}
        </ng-container>
      </ng-container>
    </p>
    <p *ngFor="let txt of verse.text" class="verseText arabic" dir="rtl" [innerHTML]="txt"></p>
  </div>
  <div [class.side-by-side]="(translation2$ | async)">
    <div class="translation-col">
      <p *ngFor="let trt of verse.translations[(translation$ | async)]" [class]="'translation ' + (translationClass$ | async)" [innerHTML]="trt"></p>
    </div>
    <div class="translation-col translation-col-2" *ngIf="(translation2$ | async) as t2">
      <p *ngFor="let trt of verse.translations[t2]" [class]="'translation ' + (translationClass2$ | async)" [innerHTML]="trt"></p>
    </div>
  </div>
</div>
