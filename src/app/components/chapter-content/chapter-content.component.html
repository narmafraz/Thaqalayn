<ng-container *ngIf="(book$ | async) as book">
  <app-settings></app-settings>
  <app-book-titles [titles]="book.data.titles" [descriptions]="book.data.descriptions"></app-book-titles>
  <ng-container *ngFor="let verse of book.data.verses">
    <app-book-titles *ngIf="verse.part_type === 'Heading'" [verse]="verse" [headingLevel]="2"></app-book-titles>
    <mat-card appearance="outlined" *ngIf="verse.part_type === 'Hadith' || verse.part_type === 'Verse'">
      <mat-card-title>
        <div class="titles">
          <a [id]="'h' + verse.local_index" style="visibility: hidden"></a>
        </div>
      </mat-card-title>
      <mat-card-content>
        <app-verse-text [verse]="verse"></app-verse-text>
      </mat-card-content>
      <mat-card-footer>
        <div class="ref" *ngIf="(crumbs$ | async) as crumbs">
          <div class="refLink">
            <a [routerLink]="[]" [queryParamsHandling]="'preserve'" [fragment]="'h' + verse.local_index" [attr.aria-label]="'Link to verse ' + verse.local_index">
              <mat-icon>link</mat-icon>
            </a>
            <a [routerLink]="['/books', book.index + ':' + verse.local_index]"
               queryParamsHandling="preserve"
               [attr.aria-label]="'View ' + verse.part_type + ' ' + verse.local_index + ' details'"
               class="verse-detail-link"
               matTooltip="View hadith details">
              <mat-icon>open_in_new</mat-icon>
            </a>
            <button class="bookmark-icon-btn"
                    (click)="toggleVerseBookmark(book.index, verse, crumbs)"
                    [attr.aria-label]="isVerseBookmarked(book.index, verse) ? ('bookmark.remove' | translate) : ('bookmark.add' | translate)">
              <mat-icon>{{ isVerseBookmarked(book.index, verse) ? 'bookmark' : 'bookmark_border' }}</mat-icon>
            </button>
            <button class="note-icon-btn"
                    (click)="toggleNoteEditor(book.index, verse)"
                    [attr.aria-label]="hasNote(book.index, verse) ? ('annotation.edit' | translate) : ('annotation.add' | translate)">
              <mat-icon>{{ hasNote(book.index, verse) ? 'edit_note' : 'note_add' }}</mat-icon>
            </button>
            <button *ngIf="isQuranBook(book.index)"
                    class="audio-icon-btn"
                    (click)="toggleAudio(book.index, verse.local_index)"
                    [attr.aria-label]="(audioService.isPlayingAyah(getQuranSurah(book.index), verse.local_index) ? 'Pause' : 'Play') + ' audio'">
              <mat-icon>{{ audioService.isPlayingAyah(getQuranSurah(book.index), verse.local_index) ? 'pause_circle' : 'play_circle' }}</mat-icon>
            </button>
          </div>
          <div>{{ 'book.reference' | translate }}</div>
          <div>{{getBookName(crumbs)}} {{verse.index}}</div>
          <div>{{ 'book.inBookReference' | translate }}</div>
          <div>{{getInBookReference(crumbs, verse)}}</div>
          <div class="related">
            <ng-container *ngIf="verse.relations as relations">
              <div *ngFor="let relation of relations | keyvalue" class="perRel">
                <strong>{{relation.key}}</strong>:
                <app-path-link *ngFor="let rLink of relation.value" class="relLinks" [path]="rLink"></app-path-link>
              </div>
            </ng-container>
          </div>
        </div>
      </mat-card-footer>

      <!-- Note display -->
      <div class="note-display" *ngIf="hasNote(book.index, verse) && !isEditingNote(book.index, verse)">
        <mat-icon class="note-icon">sticky_note_2</mat-icon>
        <p class="note-text">{{ getNoteText(book.index, verse) }}</p>
      </div>

      <!-- Note editor -->
      <div class="note-editor" *ngIf="isEditingNote(book.index, verse)">
        <textarea [(ngModel)]="editingNoteText"
                  [placeholder]="'annotation.placeholder' | translate"
                  rows="3"
                  class="note-textarea"
                  aria-label="Personal note"></textarea>
        <div class="note-actions">
          <button mat-raised-button color="primary" (click)="saveNote(book.index, verse)">
            <mat-icon>save</mat-icon> {{ 'annotation.save' | translate }}
          </button>
          <button mat-button (click)="editingNotePath = null">
            {{ 'annotation.cancel' | translate }}
          </button>
          <button mat-button color="warn" *ngIf="hasNote(book.index, verse)" (click)="deleteNote(book.index, verse)">
            <mat-icon>delete</mat-icon> {{ 'annotation.delete' | translate }}
          </button>
        </div>
      </div>
    </mat-card>
  </ng-container>
  <app-settings></app-settings>
</ng-container>
