[build]
  command = "npm run build -- --configuration=production"
  publish = "dist/Thaqalayn/browser"

# SPA fallback handled by _redirects file (already in src/)

# Cache static assets aggressively (fingerprinted by Angular)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must not be cached
[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Edge function for diagnosing the June 2026 bandwidth incident.
# Logs User-Agent + path + IP for /books/* and /people/* requests so
# we can identify the scrapers responsible. Path config lives in the
# function's `config` export. Remove this block + the function file
# once the top consumers are identified.
[[edge_functions]]
  function = "log-ua"
  path = "/books/*"

[[edge_functions]]
  function = "log-ua"
  path = "/people/*"

[[edge_functions]]
  function = "log-ua"
  path = "/words/*"

# Note on the Netlify Prerender extension: previously installed via the
# Extensions marketplace dashboard. Disable it there if it is still
# consuming Puppeteer-render bandwidth on bot traffic.
