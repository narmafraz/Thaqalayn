[build]
  command = "npm run build -- --configuration=production"
  publish = "dist/Thaqalayn/browser"

# SPA fallback handled by _redirects file (already in src/)

# Cache static assets aggressively (fingerprinted by Angular)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must not be cached
[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# NOTE: Install "Prerender" from the Netlify Extensions marketplace
# (free tier available). Bots (Googlebot, etc.) will receive
# pre-rendered HTML snapshots for full SEO indexing of the SPA.
