<ng-container *ngIf="(error$ | async) as error; else content">
  <app-error-display [message]="error" (retry)="onRetry()"></app-error-display>
</ng-container>

<ng-template #content>
  <div *ngIf="(loading$ | async)" class="loading-container">
    <mat-spinner diameter="48"></mat-spinner>
    <p>{{ 'common.loading' | translate }}</p>
  </div>

  <ng-container *ngIf="(book$ | async) as book" [ngSwitch]="book.kind">
    <ng-container *ngSwitchCase="'chapter_list'">
      <ng-container *ngIf="book.index === 'books'">
        <div *ngIf="(dailyVerse$ | async) as dv" class="daily-verse-card mat-elevation-z2">
          <div class="daily-verse-label">
            <mat-icon>auto_stories</mat-icon>
            <span>{{ 'dailyVerse.title' | translate }}</span>
          </div>
          <div class="daily-verse-arabic" lang="ar" dir="rtl">{{ dv.arabicText }}</div>
          <div class="daily-verse-translation" *ngIf="dv.translationText" [innerHTML]="dv.translationText"></div>
          <div class="daily-verse-footer">
            <span class="daily-verse-ref">{{ dv.reference }}</span>
            <a [routerLink]="dv.path" queryParamsHandling="preserve" class="daily-verse-link">
              {{ 'dailyVerse.readMore' | translate }} →
            </a>
          </div>
        </div>
        <app-book-tree></app-book-tree>
      </ng-container>
      <app-chapter-list [book$]="book$"></app-chapter-list>
    </ng-container>
    <app-chapter-content *ngSwitchCase="'verse_list'" [book$]="book$"></app-chapter-content>
    <app-verse-detail *ngSwitchCase="'verse_detail'" [book$]="book$"></app-verse-detail>
    <!-- <app-verse-content *ngSwitchCase="'verse_content'" [book$]="book$"></app-verse-content> -->
    <p *ngSwitchDefault>
      Not sure how to display this book part, sorry!
    </p>
  </ng-container>
</ng-template>
