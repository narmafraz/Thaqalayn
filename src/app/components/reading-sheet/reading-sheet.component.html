<div class="reading-sheet-backdrop" *ngIf="open$ | async" (click)="close()" aria-hidden="true"></div>
<aside class="reading-sheet-panel" [class.open]="open$ | async"
       role="dialog" aria-modal="true"
       [attr.aria-label]="'settings.ai.title' | translate"
       [attr.aria-hidden]="!(open$ | async)">
  <header class="reading-sheet-header">
    <mat-icon>auto_awesome</mat-icon>
    <span class="reading-sheet-title">{{ 'settings.ai.title' | translate }}</span>
    <button class="reading-sheet-close" (click)="close()"
            [attr.aria-label]="'settings.close' | translate"
            [matTooltip]="'settings.close' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </header>
  <div class="reading-sheet-body" *ngIf="preferences$ | async as prefs">
    <label class="ai-pref" for="rs-pref-diacritized">
      <input type="checkbox" id="rs-pref-diacritized" [checked]="prefs.showDiacritizedByDefault"
             (change)="onPrefChange('showDiacritizedByDefault', $any($event.target).checked)">
      <span>{{ 'settings.ai.showDiacritized' | translate }}</span>
    </label>
    <label class="ai-pref" for="rs-pref-badges">
      <input type="checkbox" id="rs-pref-badges" [checked]="prefs.showContentTypeBadges"
             (change)="onPrefChange('showContentTypeBadges', $any($event.target).checked)">
      <span>{{ 'settings.ai.showBadges' | translate }}</span>
    </label>
    <label class="ai-pref" for="rs-pref-topics">
      <input type="checkbox" id="rs-pref-topics" [checked]="prefs.showTopicTags"
             (change)="onPrefChange('showTopicTags', $any($event.target).checked)">
      <span>{{ 'settings.ai.showTopics' | translate }}</span>
    </label>
    <label class="ai-pref" for="rs-pref-disclaimer">
      <input type="checkbox" id="rs-pref-disclaimer" [checked]="prefs.showAiTranslationDisclaimer"
             (change)="onPrefChange('showAiTranslationDisclaimer', $any($event.target).checked)">
      <span>{{ 'settings.ai.showDisclaimer' | translate }}</span>
    </label>
    <label class="ai-pref">
      <span>{{ 'settings.ai.wordByWordLang' | translate }}</span>
      <select [ngModel]="prefs.wordByWordDefaultLang"
              (ngModelChange)="onLangChange($event)" class="ai-lang-select"
              [attr.aria-label]="'settings.ai.wordByWordLang' | translate">
        <option value="en">English</option>
        <option value="ur">اردو</option>
        <option value="tr">Türkçe</option>
        <option value="fa">فارسی</option>
        <option value="id">Indonesia</option>
        <option value="bn">বাংলা</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="zh">中文</option>
      </select>
    </label>
  </div>
</aside>
